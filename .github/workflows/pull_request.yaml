            --keep SSH_AUTH_SOCK
            --keep GITHUB_TOKEN
            --keep AWS_ROLE
            --keep AWS_REGION
            --keep AWS_DEFAULT_REGION
            --keep AWS_ACCESS_KEY_ID
            --keep AWS_SECRET_ACCESS_KEY
            --keep AWS_SESSION_TOKEN
            --keep UPDATECLI_GPGTOKEN
            --keep UPDATECLI_GITHUB_TOKEN
            --keep UPDATECLI_GITHUB_ACTOR
            --keep GPG_SIGNING_KEY
            --keep NIX_SSL_CERT_FILE
            --keep NIX_ENV_LOADED
            --keep TERM
            --command bash -e {0}"
        run: ${{ github.workspace }}/.github/workflows/scripts/test-compile-check.sh

  lint-tests:
    name: 'Lint Tests'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: lint-tests
        id: lint-tests
        shell: >-
          su suse bash -c "source /home/suse/.profile; \
          nix develop
            --ignore-environment
            --extra-experimental-features nix-command
            --extra-experimental-features flakes
            --keep HOME
            --keep SSH_AUTH_SOCK
            --keep GITHUB_TOKEN
            --keep AWS_ROLE
            --keep AWS_REGION
            --keep AWS_DEFAULT_REGION
            --keep AWS_ACCESS_KEY_ID
            --keep AWS_SECRET_ACCESS_KEY
            --keep AWS_SESSION_TOKEN
            --keep UPDATECLI_GPGTOKEN
            --keep UPDATECLI_GITHUB_TOKEN
            --keep UPDATECLI_GITHUB_ACTOR
            --keep GPG_SIGNING_KEY
            --keep NIX_SSL_CERT_FILE
            --keep NIX_ENV_LOADED
            --keep TERM
            --command bash -e {0}"
        run: ${{ github.workspace }}/.github/workflows/scripts/lint-tests.sh
