name: release

on:
  push:
    branches:
    - main

env:
  AWS_REGION: us-west-2
  AWS_ROLE: arn:aws:iam::270074865685:role/terraform-module-ci-test
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  ACME_SERVER_URL: https://acme-v02.api.letsencrypt.org/directory
  AWS_MAX_ATTEMPTS: 100
  AWS_RETRY_MODE: adaptive

permissions: {}

jobs:
  release:
    name: 'Release'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_pr: ${{ steps.release-please.outputs.pr }}
    steps:
      - name: Checkout
        id: checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          fetch-depth: 0
      - name: Release Please
        id: release-please
        # https://github.com/googleapis/release-please-action/releases
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: terraform-module
      - name: Create PR Comment
        id: create-pr-comment
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: steps.release-please.outputs.pr
        env:
          PR_NUMBER: ${{ fromJson(steps.release-please.outputs.pr).number }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const script = await import('${{ github.workspace }}/.github/workflows/scripts/release-pr-comment.js');
            await script.default({ github, context, core, process });

  test:
    name: 'Test'
    needs:
      - release
    if: needs.release.outputs.release_pr
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        id: checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          fetch-depth: 0
      - name: Configure AWS Credentials
        id: aws-creds
        # https://github.com/aws-actions/configure-aws-credentials/releases
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{env.AWS_ROLE}}
          role-session-name: ${{github.run_id}}
          aws-region: ${{env.AWS_REGION}}
          role-duration-seconds: 28800 # 8 hours
          output-credentials: true
      - name: run_tests
        id: run-tests
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          ZONE: ${{secrets.ZONE}}
          IDENTIFIER: ${{github.run_id}}
        run: bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/run-tests.sh"

  cleanup:
    name: 'Cleanup'
    needs:
      - release
      - test
    if: always() && needs.release.outputs.release_pr
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        id: checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          fetch-depth: 0
      - name: Configure AWS Credentials
        id: aws-creds
        # https://github.com/aws-actions/configure-aws-credentials/releases
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{env.AWS_ROLE}}
          role-session-name: ${{github.run_id}}-cleanup
          aws-region: ${{env.AWS_REGION}}
          role-duration-seconds: 3600 # 1 hour
          output-credentials: true
      - name: cleanup
        id: cleanup
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          IDENTIFIER: ${{github.run_id}}
        run: bash .github/workflows/scripts/nix-run.sh "bash .github/workflows/scripts/cleanup-tests.sh"

  report:
    name: 'Report'
    needs:
      - release
      - test
      - cleanup
    if: success() && needs.release.outputs.release_pr # Ensure the test jobs succeeded, and that a release PR was created.
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        id: checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          fetch-depth: 0
      - name: Report Success
        id: report-success
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ fromJson(needs.release.outputs.release_pr).number }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const script = await import('${{ github.workspace }}/.github/workflows/scripts/report-success.js');
            await script.default({ github, context, core, process });
